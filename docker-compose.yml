# Full stack: one command brings up everything (REQ-011).
# The three backend services share one image with different entrypoints.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bitunix
      POSTGRES_PASSWORD: bitunix
      POSTGRES_DB: bitunix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitunix"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend-api:
    build: ./backend
    command: >-
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bitunix:bitunix@postgres:5432/bitunix
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      LOG_JSON: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  trading-worker:
    build: ./backend
    command: python -m app.workers.trading_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://bitunix:bitunix@postgres:5432/bitunix
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      LOG_JSON: "true"
    depends_on:
      backend-api:
        condition: service_started
      redpanda:
        condition: service_healthy

  db-writer:
    build: ./backend
    command: python -m app.workers.db_writer
    environment:
      DATABASE_URL: postgresql+asyncpg://bitunix:bitunix@postgres:5432/bitunix
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      LOG_JSON: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend-api:
        condition: service_started

  db-tunnel:
    image: ngrok/ngrok:latest
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command: tcp postgres:5432 --log stdout
    ports:
      - "4040:4040"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
